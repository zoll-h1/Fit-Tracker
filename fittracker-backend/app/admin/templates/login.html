<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login — FitTracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body { background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }</style>
</head>
<body>
<div style="width: 360px;">
  <div class="text-center mb-4">
    <div class="fs-2">🏋️</div>
    <div class="fw-bold text-white fs-4">FitTracker Admin</div>
  </div>
  <div class="card p-4" style="background:#1e293b; border: 1px solid #334155;">
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="POST" action="/admin/login">
      <div class="mb-3">
        <label class="form-label text-muted">Password</label>
        <input type="password" name="password" class="form-control" style="background:#0f172a; border-color:#334155; color:#e2e8f0;" required autofocus>
      </div>
      <button type="submit" class="btn w-100" style="background:#7c3aed; color:white;">Login</button>
    </form>
  </div>
</div>
</body>
</html>
