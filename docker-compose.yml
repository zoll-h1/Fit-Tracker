services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fittracker
      POSTGRES_PASSWORD: fittracker_pass
      POSTGRES_DB: fittracker_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fittracker -d fittracker_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./fittracker-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://fittracker:fittracker_pass@db:5432/fittracker_db
      SECRET_KEY: super-secret-jwt-key-change-in-production-min32chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      UPLOAD_DIR: uploads
      MAX_UPLOAD_SIZE_MB: 5
      BACKEND_CORS_ORIGINS: '["http://localhost","http://localhost:80"]'
      ENVIRONMENT: production
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./fittracker-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  backend_uploads:
