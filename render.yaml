services:
  - type: web
    name: fittracker-backend
    runtime: docker
    dockerfilePath: ./fittracker-backend/Dockerfile
    dockerContext: ./fittracker-backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fittracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: BACKEND_CORS_ORIGINS
        value: '["*"]'
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: 5
      # Set these in Render dashboard after creating Cloudinary account:
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""

databases:
  - name: fittracker-db
    plan: free
    databaseName: fittracker_db
    user: fittracker
